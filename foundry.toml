[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
  '@chainlink/contracts-ccip/=node_modules/@chainlink/contracts-ccip/',
  '@chainlink/contracts/=node_modules/@chainlink/contracts/',
  '@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/',
  '@openzeppelin/contracts@4.8.3/=node_modules/@openzeppelin/contracts-4.8.3/',
  '@openzeppelin/contracts@5.0.2/=node_modules/@openzeppelin/contracts-5.0.2/'
]

fs_permissions = [{ access = "read-write", path = "./" }]
# Formatter
[fmt]
multiline_func_header = "all" # Or  params_first
contract_new_lines = true
line_length = 120
#bracket_spacing = true
wrap_comments = true
sort_imports = true
number_underscore = "thousands"
ignore = ["./script/**/*", "./lib/**/*"] # Paths to ignore from formatting

# Linter
[lint]
#lint_on_build = false
exclude_lints = ["screaming-snake-case-immutable", "mixed-case-variable"]
ignore = ["./test/**/*"]

# Fuzzing configs
[fuzz]
runs = 512

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
